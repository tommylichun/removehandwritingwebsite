<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Us - Paper Restore King</title>
    <link rel="icon" type="image/webp" href="../assets/logo.webp" />
    <link rel="apple-touch-icon" href="../assets/logo.webp" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Contact Paper Restore King: info@chunwacreative.com" />
    <link rel="canonical" href="./contact.html" />
    <link rel="alternate" hreflang="en" href="./contact.html" />
    <link rel="alternate" hreflang="zh-Hant-HK" href="../contact.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Contact Us - Paper Restore King" />
    <meta property="og:description" content="Email: info@chunwacreative.com" />
    <meta property="og:image" content="../assets/hero-undo-handwriting.webp" />
    <meta property="twitter:card" content="summary_large_image" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contact Us - Paper Restore King",
        "email": "info@chunwacreative.com"
      }
    </script>
    <style>
      :root { --bg:#0b1220; --text:rgba(255,255,255,0.92); --muted:rgba(255,255,255,0.68); --border:rgba(255,255,255,0.12); }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "PingFang TC",
          "Noto Sans HK", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 800px at 20% -10%, rgba(74, 163, 255, 0.35), transparent 60%), var(--bg);
        line-height: 1.7;
      }
      .wrap { max-width: 900px; margin: 0 auto; padding: 24px 18px 60px; }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(10px);
        background: rgba(11, 18, 32, 0.65);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .nav {
        max-width: 900px;
        margin: 0 auto;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      .brand { font-weight: 900; letter-spacing: 0.2px; display:flex; gap:10px; align-items:center; }
      .mark {
        width: 28px; height: 28px; border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 10px 30px rgba(74, 163, 255, 0.18);
        overflow: hidden;
        display: block;
        object-fit: cover;
      }
      .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.03);
        text-decoration: none;
      }
      .pill:hover { background: rgba(255,255,255,0.06); }
      .card {
        margin-top: 18px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        border-radius: 16px;
        padding: 16px;
      }
      footer { margin-top: 26px; color: var(--muted); font-size: 14px; }
      .back { margin-top: 10px; }
    </style>
  </head>
  <body>
    <header>
      <div class="nav">
        <div class="brand">
          <img class="mark" src="../assets/logo.webp" alt="Paper Restore King" width="28" height="28" loading="eager" />
          Paper Restore King
        </div>
        <div class="links">
          <a class="pill" href="./index.html">Home</a>
          <a class="pill" href="https://paperrestoreking.chunwacreative.com/privacy-policy">Privacy Policy</a>
          <a class="pill" href="../contact.html">中文</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <h1 style="margin: 14px 0 6px; font-size: 34px; letter-spacing: -0.4px;">Contact Us</h1>
      <p style="margin: 0; color: var(--muted);">If you have suggestions or feedback, feel free to email us.</p>

      <div class="card">
        <p style="margin:0; color: var(--muted);">Email:</p>
        <p style="margin: 6px 0 0; font-size: 18px; font-weight: 900;">
          <a href="mailto:info@chunwacreative.com">info@chunwacreative.com</a>
        </p>
        <p style="margin: 10px 0 0; color: var(--muted);">
          Please include your device model, iOS version, and any relevant screenshots if possible.
        </p>
      </div>

      <footer>
        <div class="back">
          Back to <a href="https://chunwacreative.com" target="_blank" rel="noopener">chunwacreative.com</a>
        </div>
      </footer>
    </main>
  </body>
</html>
